<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connor's Zoo Phone</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash-screen">
    <img src="assets/splash.jpg" alt="Connor's Zoo Phone" class="splash-image"/>
    <h1>Connor's Zoo Phone</h1>
  </div>

  <!-- Main App -->
  <div id="app" class="hidden">
    <header>
      <h2>🐾 Connor's Zoo Phone</h2>
    </header>

    <main>
      <p>Tap an animal to hear its sound!</p>
      <div class="animal-grid">
        <!-- Example buttons -->
        <button class="animal-btn">🦁 Lion</button>
        <button class="animal-btn">🐘 Elephant</button>
        <button class="animal-btn">🐵 Monkey</button>
        <button class="animal-btn">🐸 Frog</button>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
