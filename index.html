<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incoming Call</title>

<style>
    body {
        margin: 0;
        background: #000;
        font-family: Arial, sans-serif;
        color: white;
        height: 100vh;
        overflow: hidden;
    }

    /* Splash Screen */
    #splash {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 1s ease;
    }

    #splash img {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 20px;
    }

    #splash p {
        font-size: 22px;
        opacity: 0.8;
    }

    /* Incoming Call Bar */
    .incoming-call-bar {
        width: 100%;
        background: #001a33;
        padding: 20px 16px;
        box-sizing: border-box;
        text-align: center;
        animation: pulse 1.2s infinite alternate;
    }

    @keyframes pulse {
        from { background: #001a33; }
        to { background: #003366; }
    }

    /* Caller Image */
    .caller-photo img {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 25px;
    }

    .caller-name {
        font-size: 26px;
        font-weight: bold;
        margin-bottom: 5px;
    }

    .caller-label {
        font-size: 16px;
        opacity: 0.7;
        margin-bottom: 20px;
    }

    /* Slider */
    .slide-container {
        width: 100%;
        height: 70px;
        background: #003366;
        border-radius: 999px;
        position: relative;
        overflow: hidden;
        border: 2px solid #66aaff;
        padding: 0 16px;
        box-sizing: border-box;
    }

    .slide-track-text {
        position: absolute;
        width: 100%;
        text-align: center;
        top: 50%;
        transform: translateY(-50%);
        font-size: 20px;
        opacity: 0.8;
        pointer-events: none;
    }

    .slide-handle {
        width: 70px;
        height: 70px;
        background: #66aaff;
        border-radius: 50%;
        position: absolute;
        left: 0;
        top: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        color: #003366;
        cursor: pointer;
        transition: transform 0.2s ease;
    }

    /* Keypad */
    .keypad-wrapper {
        flex: 1;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        margin-bottom: 60px;
    }

    .keypad {
        display: grid;
        grid-template-columns: repeat(3, 90px);
        grid-gap: 18px;
    }

    .key {
        width: 90px;
        height: 90px;
        background: #222;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        cursor: pointer;
        transition: background 0.2s;
    }

    .key:active {
        background: #444;
    }

    /* Call Button */
    .call-btn {
        width: 90px;
        height: 90px;
        background: #00cc44;
        border-radius: 50%;
        margin: 20px auto 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        cursor: pointer;
    }
</style>
</head>

<body>

<!-- Splash Screen -->
<div id="splash">
    <img src="connor.jpg" alt="Loading">
    <p>Loading Connor… please wait</p>
</div>

<!-- Incoming Call UI -->
<div class="incoming-call-bar" id="incomingBar">

    <div class="caller-photo">
        <img src="connor.jpg" alt="Caller">
    </div>

    <div class="caller-name">Zoo HQ</div>
    <div class="caller-label">Incoming call</div>

    <div class="slide-container" id="slideContainer">
        <div class="slide-track-text" id="slideText">Slide to answer</div>
        <div class="slide-handle" id="slideHandle">›</div>
    </div>

</div>

<div class="keypad-wrapper">
    <div class="keypad">
        <div class="key">1</div>
        <div class="key">2</div>
        <div class="key">3</div>
        <div class="key">4</div>
        <div class="key">5</div>
        <div class="key">6</div>
        <div class="key">7</div>
        <div class="key">8</div>
        <div class="key">9</div>
        <div class="key">*</div>
        <div class="key">0</div>
        <div class="key">#</div>
    </div>
</div>

<div class="call-btn">📞</div>

<script>
    /* Splash Screen Fade */
    window.addEventListener("load", () => {
        setTimeout(() => {
            const splash = document.getElementById("splash");
            splash.style.opacity = "0";
            setTimeout(() => splash.remove(), 1000);
        }, 1500);
    });

    const slideHandle = document.getElementById("slideHandle");
    const slideContainer = document.getElementById("slideContainer");
    const slideText = document.getElementById("slideText");
    const incomingBar = document.getElementById("incomingBar");

    let isDragging = false;
    let startX = 0;

    const ringtone = new Audio("https://actions.google.com/sounds/v1/alarms/phone_alerts_and_rings.ogg");
    ringtone.loop = true;

    const chime = new Audio("https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg");

    let audioActivated = false;
    let vibrationInterval = null;

    /* First tap → chime + restart ringtone */
    window.addEventListener("click", () => {
        if (!audioActivated) {
            chime.play().catch(()=>{});
            ringtone.currentTime = 0;
            ringtone.play().catch(()=>{});
            audioActivated = true;

            /* Start repeating vibration */
            vibrationInterval = setInterval(() => {
                if (navigator.vibrate) navigator.vibrate(200);
            }, 1000);
        }
    });

    function getMaxLeft() {
        return slideContainer.clientWidth - slideHandle.clientWidth - 16;
    }

    slideHandle.addEventListener("mousedown", (e) => {
        isDragging = true;
        startX = e.clientX - slideHandle.offsetLeft;
    });

    window.addEventListener("mouseup", () => {
        if (!isDragging) return;
        isDragging = false;

        const maxLeft = getMaxLeft();
        const currentLeft = parseInt(slideHandle.style.left || 0);

        if (currentLeft >= maxLeft - 5) {
            ringtone.pause();
            ringtone.currentTime = 0;
            incomingBar.style.animation = "none";
            slideText.textContent = "Call Answered";

            slideHandle.style.transition = "all 0.2s ease";
            slideHandle.style.transform = "scale(0)";
            slideHandle.style.opacity = "0";

            /* Stop vibration */
            clearInterval(vibrationInterval);

            /* Remove green call button after 15 seconds */
            setTimeout(() => {
                const callBtn = document.querySelector(".call-btn");
                if (callBtn) callBtn.remove();
            }, 15000);

        } else {
            slideHandle.style.left = "0px";
        }
    });

    window.addEventListener("mousemove", (e) => {
        if (!isDragging) return;

        let newLeft = e.clientX - startX;
        const maxLeft = getMaxLeft();

        if (newLeft < 0) newLeft = 0;
        if (newLeft > maxLeft) newLeft = maxLeft;

        slideHandle.style.left = newLeft + "px";
    });
</script>

</body>
</html>
