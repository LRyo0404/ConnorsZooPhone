<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incoming Call</title>

<style>
    body {
        margin: 0;
        background: #000;
        font-family: Arial, sans-serif;
        color: white;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    /* Splash Screen */
    #splash {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 1s ease;
    }

    #splash img {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 20px;
    }

    #splash p {
        font-size: 22px;
        opacity: 0.8;
    }

    /* Banner */
    .banner {
        width: 100%;
        position: relative;
        overflow: hidden;
    }

    .banner img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: blur(8px);
        transition: filter 0.5s ease;
    }

    @media (min-width: 500px) {
        .banner img { filter: blur(15px); }
    }

    @media (min-width: 900px) {
        .banner img { filter: blur(25px); }
    }

    .banner::after {
        content: "";
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 40%;
        background: linear-gradient(to bottom, transparent, #000);
    }

    .banner-text {
        position: absolute;
        top: 50%;
        width: 100%;
        text-align: center;
        transform: translateY(-50%);
        text-shadow: 0 0 10px black;
    }

    .banner-title {
        font-size: 32px;
        font-weight: bold;
    }

    .banner-sub {
        font-size: 18px;
        opacity: 0.8;
    }

    /* Keypad */
    .keypad-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding-top: 10px;
    }

    .keypad {
        display: grid;
        grid-template-columns: repeat(3, 90px);
        grid-gap: 18px;
    }

    @media (max-width: 450px) {
        .keypad {
            grid-template-columns: repeat(3, 70px);
            grid-gap: 14px;
        }
        .key {
            width: 70px !important;
            height: 70px !important;
            font-size: 26px !important;
        }
    }

    .key {
        width: 90px;
        height: 90px;
        background: #222;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        cursor: pointer;
        transition: background 0.2s;
    }

    .key:active {
        background: #444;
    }

    /* Bottom Section */
    .bottom-section {
        width: 100%;
        text-align: center;
        padding-bottom: 20px;
    }

    .caller-photo-bottom img {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 25px;
    }

    @media (max-width: 450px) {
        .caller-photo-bottom img {
            width: 100px;
            height: 100px;
        }
    }

    /* Slider */
    .slide-container {
        width: calc(100% - 32px);
        height: 70px;
        background: #003366;
        border-radius: 999px;
        position: relative;
        overflow: hidden;
        border: 2px solid #66aaff;
        margin: 0 auto;
    }

    @media (max-width: 450px) {
        .slide-container {
            height: 60px;
        }
    }

    .slide-track-text {
        position: absolute;
        width: 100%;
        text-align: center;
        top: 50%;
        transform: translateY(-50%);
        font-size: 20px;
        opacity: 0.8;
        pointer-events: none;
    }

    .slide-handle {
        width: 70px;
        height: 70px;
        background: #66aaff;
        border-radius: 50%;
        position: absolute;
        left: 0;
        top: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        color: #003366;
        cursor: pointer;
        transition: transform 0.2s ease;
    }

    @media (max-width: 450px) {
        .slide-handle {
            width: 60px;
            height: 60px;
            font-size: 32px;
        }
    }
</style>
</head>

<body>

<!-- Splash Screen -->
<div id="splash">
    <img src="connor.jpg" alt="Loading">
    <p>Loading Connor… please wait</p>
</div>

<!-- Banner -->
<div class="banner" id="banner">
    <img src="connor.jpg" alt="Banner">
    <div class="banner-text">
        <div class="banner-title">Zoo HQ</div>
        <div class="banner-sub">Incoming call</div>
    </div>
</div>

<!-- Keypad -->
<div class="keypad-wrapper">
    <div class="keypad">
        <div class="key">1</div>
        <div class="key">2</div>
        <div class="key">3</div>
        <div class="key">4</div>
        <div class="key">5</div>
        <div class="key">6</div>
        <div class="key">7</div>
        <div class="key">8</div>
        <div class="key">9</div>
        <div class="key">*</div>
        <div class="key">0</div>
        <div class="key">#</div>
    </div>
</div>

<!-- Bottom Section -->
<div class="bottom-section">
    <div class="caller-photo-bottom">
        <img src="connor.jpg" alt="Caller">
    </div>

    <div class="slide-container" id="slideContainer">
        <div class="slide-track-text" id="slideText">Slide to answer</div>
        <div class="slide-handle" id="slideHandle">›</div>
    </div>
</div>

<script>
    /* Splash Screen Fade */
    window.addEventListener("load", () => {
        setTimeout(() => {
            const splash = document.getElementById("splash");
            splash.style.opacity = "0";
            setTimeout(() => splash.remove(), 1000);
        }, 1500);
    });

    const slideHandle = document.getElementById("slideHandle");
    const slideContainer = document.getElementById("slideContainer");
    const slideText = document.getElementById("slideText");

    const ringtone = new Audio("https://actions.google.com/sounds/v1/alarms/phone_alerts_and_rings.ogg");
    ringtone.loop = true;

    const chime = new Audio("https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg");

    let audioActivated = false;
    let vibrationInterval = null;

    /* First tap → chime + restart ringtone */
    window.addEventListener("click", () => {
        if (!audioActivated) {
            chime.play().catch(()=>{});
            ringtone.currentTime = 0;
            ringtone.play().catch(()=>{});
            audioActivated = true;

            vibrationInterval = setInterval(() => {
                if (navigator.vibrate) navigator.vibrate(200);
            }, 1000);
        }
    });

    function answerCall() {
        ringtone.pause();
        ringtone.currentTime = 0;
        slideText.textContent = "Call Answered";

        slideHandle.style.transition = "all 0.2s ease";
        slideHandle.style.transform = "scale(0)";
        slideHandle.style.opacity = "0";

        clearInterval(vibrationInterval);

        setTimeout(() => {
            const callBtn = document.querySelector(".call-btn");
            if (callBtn) callBtn.remove();
        }, 15000);
    }

    /* Sliding Logic (Mouse + Touch) */
    let isDragging = false;
    let startX = 0;

    function startDrag(clientX) {
        isDragging = true;
        const rect = slideContainer.getBoundingClientRect();
        startX = clientX - rect.left - slideHandle.offsetLeft;
    }

    function moveDrag(clientX) {
        if (!isDragging) return;

        const rect = slideContainer.getBoundingClientRect();
        let newLeft = clientX - rect.left - startX;

        const maxLeft = rect.width - slideHandle.offsetWidth - 16;

        if (newLeft < 0) newLeft = 0;
        if (newLeft > maxLeft) newLeft = maxLeft;

        slideHandle.style.left = newLeft + "px";
    }

    function endDrag() {
        if (!isDragging) return;
        isDragging = false;

        const rect = slideContainer.getBoundingClientRect();
        const maxLeft = rect.width - slideHandle.offsetWidth - 16;
        const currentLeft = parseInt(slideHandle.style.left || 0);

        if (currentLeft >= maxLeft - 5) {
            answerCall();
        } else {
            slideHandle.style.left = "0px";
        }
    }

    slideHandle.addEventListener("mousedown", e => startDrag(e.clientX));
    window.addEventListener("mousemove", e => moveDrag(e.clientX));
    window.addEventListener("mouseup", endDrag);

    slideHandle.addEventListener("touchstart", e => startDrag(e.touches[0].clientX));
    window.addEventListener("touchmove", e => moveDrag(e.touches[0].clientX));
    window.addEventListener("touchend", endDrag);
</script>

</body>
</html>
